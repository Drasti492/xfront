<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart | Lumina Intimates</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../css/x.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#fff0f5] text-gray-800 overflow-x-hidden">

    <!-- NAVBAR -->
    <nav id="navbar" class="bg-white border-b border-pink-100 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-6 flex items-center justify-between">
            <div class="flex items-center gap-x-3">
                <div class="w-10 h-10 bg-pink-600 rounded-3xl flex items-center justify-center">
                    <span class="text-white text-3xl font-bold tracking-tighter">LI</span>
                </div>
                <span class="text-3xl font-semibold text-pink-600 tracking-tighter">Lumina</span>
            </div>

         <div class="hidden md:flex items-center gap-x-10 text-base font-medium">
    <a href="../index.html" class="hover:text-pink-600 transition-colors">Home</a>
    <a href="her.html" class="hover:text-pink-600 transition-colors">For Her</a>
    <a href="him.html" class="hover:text-pink-600 transition-colors">For Him</a>
    <a href="cart.html" class="text-pink-600 font-semibold">Cart</a>
         </div>

            <button onclick="window.location.href='cart.html'" 
                class="flex items-center gap-x-2 text-gray-700 hover:text-pink-600 transition-colors">
                <i class="fas fa-shopping-bag text-2xl"></i>
                <span id="cart-count" class="font-semibold text-pink-600">0</span>
             </button>
                
                <button id="hamburger" class="md:hidden w-11 h-11 flex items-center justify-center">
                    <svg id="hamburger-icon" xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-gray-700" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
                    </svg>
                </button>
            </div>
        </div>

        <div id="mobile-menu" class="hidden md:hidden bg-white border-t px-6 py-8">
            <div class="flex flex-col gap-y-6 text-lg font-medium">
                <a href="../index.html" onclick="toggleMobileMenu()" class="hover:text-pink-600">Home</a>
                <a href="her.html" onclick="toggleMobileMenu()" class="hover:text-pink-600">For Her</a>
                <a href="him.html" onclick="toggleMobileMenu()" class="hover:text-pink-600">For Him</a>
                <a href="cart.html" onclick="toggleMobileMenu()" class="text-pink-600 font-semibold">Cart</a>
            </div>
        </div>
    </nav>

    <!-- CART CONTENT -->
    <section class="py-20 bg-white min-h-screen">
        <div class="max-w-7xl mx-auto px-6">
            <h1 class="text-5xl font-semibold tracking-tight mb-12">Your Cart</h1>

            <div class="grid md:grid-cols-12 gap-12">
                <!-- Items -->
                <div class="md:col-span-7" id="cart-items"></div>

                <!-- Summary -->
                <div class="md:col-span-5">
                    <div class="bg-pink-50 rounded-3xl p-10 sticky top-8">
                        <h3 class="text-2xl font-semibold mb-8">Order Summary</h3>
                        <div class="space-y-4">
                            <div class="flex justify-between text-lg">
                                <span>Subtotal</span>
                                <span id="subtotal" class="font-medium">$0</span>
                            </div>
                            <div class="flex justify-between text-lg">
                                <span>Shipping</span>
                                <span class="text-green-600 font-medium">FREE</span>
                            </div>
                            <hr class="border-pink-200 my-6">
                            <div class="flex justify-between text-2xl font-semibold">
                                <span>Total</span>
                                <span id="total" class="text-pink-600">$0</span>
                            </div>
                        </div>

                        <button onclick="checkout()" 
                                class="mt-12 w-full bg-pink-600 hover:bg-pink-700 text-white py-6 rounded-3xl font-semibold text-lg transition-all">
                            PROCEED TO CHECKOUT
                        </button>

                        <a href="her.html" class="block text-center text-pink-600 mt-8 hover:underline">
                            ← Continue Shopping
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer class="bg-gray-900 text-white/70 py-16">
        <div class="max-w-7xl mx-auto px-6 text-center text-sm">
            © 2026 Lumina Intimates. All rights reserved.
        </div>
    </footer>

    <script src="../js/x.js"></script>
    <script src="../js/cart.js"></script>
</body>
</html>
